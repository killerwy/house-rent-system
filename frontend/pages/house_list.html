<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>房源管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/table.css">
</head>
<body>
    <div class="page-card">
        <div class="page-title">房源信息管理</div>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="houseKeyword" class="form-control form-control-sm" placeholder="搜索房号/地址" style="width:200px;">
                <select id="houseStatus" class="form-select form-select-sm" style="width:120px;">
                    <option value="-1">全部状态</option>
                    <option value="0">空置可租</option>
                    <option value="1">已出租</option>
                    <option value="2">维修中</option>
                    <option value="3">已下架</option>
                </select>
                <button class="btn btn-sm btn-primary" onclick="searchHouse()">搜索</button>
            </div>
            <div>
                <button class="btn btn-primary btn-sm" id="addHouseBtn" onclick="openHouseAdd()">+ 新增房源</button>
            </div>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>房号</th>
                        <th>户型</th>
                        <th>房东</th>
                        <th>地址</th>
                        <th>面积</th>
                        <th>月租金</th>
                        <th>状态</th>
                        <th width="160">操作</th>
                    </tr>
                </thead>
                <tbody id="houseTableBody"></tbody>
            </table>
        </div>
        <div id="housePagination" class="pagination"></div>
    </div>

    <!-- 房源编辑弹窗 -->
    <div class="modal fade" id="houseModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="houseModalTitle">新增房源</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="houseForm" class="modal-body modal-form">
                    <input type="hidden" id="houseId">
                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label>房号 <span style="color:red">*</span></label>
                            <input type="text" id="houseNo" placeholder="唯一标识">
                        </div>
                        <div class="col-md-6 form-group">
                            <label>户型 <span style="color:red">*</span></label>
                            <select id="typeId"></select>
                        </div>
                        <div class="col-md-6 form-group">
                            <label>房东 <span style="color:red">*</span></label>
                            <select id="landId"></select>
                        </div>
                        <div class="col-md-6 form-group">
                            <label>建筑面积(㎡) <span style="color:red">*</span></label>
                            <input type="number" id="area" step="0.1">
                        </div>
                        <div class="col-md-6 form-group">
                            <label>月租金(元) <span style="color:red">*</span></label>
                            <input type="number" id="rentPrice" step="0.01">
                        </div>
                        <div class="col-md-6 form-group">
                            <label>押金(元) <span style="color:red">*</span></label>
                            <input type="number" id="deposit" step="0.01">
                        </div>
                        <div class="col-md-12 form-group">
                            <label>房屋地址 <span style="color:red">*</span></label>
                            <input type="text" id="address" placeholder="详细地址">
                        </div>
                        <div class="col-md-6 form-group">
                            <label>房屋状态</label>
                            <select id="houseStatusSelect">
                                <option value="0">空置可租</option>
                                <option value="1">已出租</option>
                                <option value="2">维修中</option>
                                <option value="3">已下架</option>
                            </select>
                        </div>
                        <div class="col-md-12 form-group">
                            <label>配套设施</label>
                            <textarea id="facilities" rows="2"></textarea>
                        </div>
                    </div>
                </form>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveHouse()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/axios.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/house.js"></script>
    <script>
        window.onload = function() {
            if (!hasPermission("house")) {
                document.getElementById("addHouseBtn").style.display = "none";
            }
            loadHouseList();
        };
    </script>
</body>
</html>
