<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>租赁合同管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/table.css">
</head>
<body>
    <div class="page-card">
        <div class="page-title">租赁合同管理</div>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="rentKeyword" class="form-control form-control-sm" placeholder="搜索地址/租客" style="width:200px;">
                <select id="rentStatus" class="form-select form-select-sm" style="width:120px;">
                    <option value="-1">全部状态</option>
                    <option value="0">租住中</option>
                    <option value="1">已退租</option>
                </select>
                <button class="btn btn-sm btn-primary" onclick="searchRent()">搜索</button>
            </div>
            <div>
                <a href="rent_add.html" class="btn btn-primary btn-sm">+ 新增出租</a>
            </div>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>地址</th>
                        <th>租客</th>
                        <th>起租日期</th>
                        <th>到期日期</th>
                        <th>月租金</th>
                        <th>状态</th>
                        <th>经办人</th>
                        <th>创建时间</th>                        
                        <th width="180">操作</th>
                    </tr>
                </thead>
                <tbody id="rentTableBody"></tbody>
            </table>
        </div>
        <div id="rentPagination" class="pagination"></div>
    </div>

    <!-- 退租弹窗 -->
    <div class="modal fade" id="returnModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">办理退租</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body modal-form">
                    <input type="hidden" id="returnRentId">
                    <div class="form-group">
                        <label>归还日期 <span style="color:red">*</span></label>
                        <input type="date" id="returnDate">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="submitReturn()">确认退租</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/axios.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/rent.js"></script>
    <script>
        window.onload = function() {
            loadRentList();
        };
    </script>
</body>
</html>
