<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>收费记录管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/table.css">
</head>
<body>
    <div class="page-card">
        <div class="page-title">收费记录管理</div>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="chargeKeyword" class="form-control form-control-sm" placeholder="搜索关联合同/租客" style="width:200px;">
                <select id="chargeType" class="form-select form-select-sm" style="width:120px;" onchange="searchCharge()">
                    <option value="-1">全部类型</option>
                    <option value="1">租金</option>
                    <option value="2">押金</option>
                    <option value="3">中介费</option>
                </select>
                <button class="btn btn-sm btn-primary" onclick="searchCharge()">搜索</button>
            </div>
            <div>
                <button class="btn btn-primary btn-sm" id="addChargeBtn" onclick="openAddModal()">+ 新增收费</button>
            </div>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>关联合同</th>
                        <th>地址</th>
                        <th>租客</th>
                        <th>收费类型</th>
                        <th>金额</th>
                        <th>缴费时间</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="chargeTableBody"></tbody>
            </table>
        </div>
        <div id="chargePagination" class="pagination"></div>
    </div>

    <!-- 新增收费弹窗 -->
    <div class="modal fade" id="chargeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新增收费登记</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body modal-form">
                    <div class="form-group">
                        <label>关联合同 <span style="color:red">*</span></label>
                        <select id="rentSelect">
                            <option value="">请选择租赁合同</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>收费类型 <span style="color:red">*</span></label>
                        <select id="chargeTypeSelect">
                            <option value="1">租金</option>
                            <option value="2">押金</option>
                            <option value="3">中介费</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>收费金额(元) <span style="color:red">*</span></label>
                        <input type="number" id="chargeMoney" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="chargeRemark" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveCharge()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/charge.js"></script>
    <script>
        window.onload = function() {
            if (!hasPermission("charge")) {
                document.getElementById("addChargeBtn").style.display = "none";
            }
            loadChargeList();
        };
    </script>
</body>
</html>
